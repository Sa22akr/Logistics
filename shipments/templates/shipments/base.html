{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Civic Logistics{% endblock %}</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      color: #2B2B2B;
    }

    /* NAVBAR */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 8%;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo img {
      height: 45px;
      width: auto;
      display: block;
      object-fit: contain;
    }

    nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #2B2B2B;
      font-weight: 600;
    }

    nav a:hover {
      color: #FF7A1A;
    }

    .menu-btn {
      display: none;
      font-size: 26px;
      cursor: pointer;
      background: none;
      border: none;
    }

    main {
      min-height: 80vh;
    }

    /* HERO */
    .hero {
      min-height: 80vh;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      align-items: center;
      gap: 40px;
      padding: 70px 8%;
      background: linear-gradient(135deg, #f5f7fb, #ffffff);
    }

    .tagline {
      color: #FF7A1A;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: 56px;
      line-height: 1.1;
      margin-bottom: 20px;
      color: #123C8C;
    }

    .hero-text {
      font-size: 18px;
      color: #555;
      max-width: 600px;
      line-height: 1.7;
    }

    .hero-buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      margin-right: 12px;
      cursor: pointer;
    }

    .primary {
      background: #123C8C;
      color: white;
    }

    .primary:hover {
      background: #0e2f6b;
    }

    .secondary {
      background: white;
      color: #123C8C;
      border: 1px solid #123C8C;
    }

    /* HERO CARD */
    .hero-card {
      background: #123C8C;
      color: white;
      padding: 36px;
      border-radius: 22px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }

    .hero-card h3 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .hero-card p {
      color: #d1d5db;
      line-height: 1.6;
    }

    .status-box {
      margin-top: 30px;
      background: white;
      color: #2B2B2B;
      padding: 20px;
      border-radius: 14px;
    }

    /* TRACKING PAGE */
    .track-section {
      min-height: 80vh;
      padding: 80px 8%;
      background: linear-gradient(135deg, #f5f7fb, #ffffff);
    }

    .track-box {
      max-width: 850px;
      margin: auto;
      background: white;
      padding: 45px;
      border-radius: 22px;
      box-shadow: 0 15px 35px rgba(0,0,0,0.08);
    }

    .track-box h1 {
      font-size: 42px;
      color: #123C8C;
      margin-bottom: 14px;
    }

    .track-text {
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }

    .track-form {
      display: flex;
      gap: 12px;
      margin-bottom: 25px;
    }

    .track-form input {
      flex: 1;
      padding: 15px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }

    .error-box {
      background: #fff1f1;
      color: #b91c1c;
      padding: 15px;
      border-radius: 10px;
      margin-top: 20px;
    }

    .result-card {
      margin-top: 30px;
      background: #f7f9fc;
      padding: 25px;
      border-radius: 16px;
      border-left: 5px solid #FF7A1A;
    }

    .result-card h2 {
      color: #123C8C;
      margin-bottom: 18px;
    }

    .result-card p {
      margin-bottom: 12px;
      color: #333;
    }

    .status-pill {
      background: #123C8C;
      color: white;
      padding: 6px 12px;
      border-radius: 20px;
    }

    /* SERVICES */
    .services {
      padding: 70px 8%;
      text-align: center;
    }

    .services h2,
    .cta h2 {
      font-size: 36px;
      margin-bottom: 14px;
      color: #123C8C;
    }

    .section-text {
      color: #666;
      margin-bottom: 40px;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .service-card {
      background: white;
      padding: 28px;
      border-radius: 18px;
      text-align: left;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
      transition: 0.3s;
    }

    .service-card:hover {
      transform: translateY(-5px);
    }

    .service-card h3 {
      margin-bottom: 12px;
      color: #123C8C;
    }

    .service-card p {
      color: #666;
      line-height: 1.6;
    }

    /* CTA */
    .cta {
      text-align: center;
      padding: 70px 8%;
      background: #123C8C;
      color: white;
    }

    .cta p {
      margin-bottom: 25px;
      color: #e5e7eb;
    }

    footer {
      text-align: center;
      padding: 24px;
      background: white;
      color: #888;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .menu-btn {
        display: block;
      }

      nav {
        display: none;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        padding: 20px;
        box-shadow: 0 10px 20px rgba(0,0,0,0.08);
      }

      nav.active {
        display: flex;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .hero h1 {
        font-size: 40px;
      }

      .service-grid {
        grid-template-columns: 1fr;
      }

      .track-form {
        flex-direction: column;
      }
    }
  </style>
</head>

<body>

<header class="navbar">
  <div class="logo">
    <img src="{% static 'shipments/images/logo.png' %}" alt="Civic Logistics Logo">
  </div>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <nav id="navMenu">
    <a href="{% url 'home' %}">Home</a>
    <a href="#">Services</a>
    <a href="{% url 'track_shipment' %}">Track Parcel</a>
    <a href="#">Book Delivery</a>
    <a href="#">Contact</a>
  </nav>
</header>

<main>
  {% block content %}
  {% endblock %}
</main>

<footer>
  <p>&copy; 2020 Civic Logistics. All rights reserved.</p>
</footer>

<script>
  function toggleMenu() {
    const navMenu = document.getElementById("navMenu");
    navMenu.classList.toggle("active");
  }
</script>

</body>
</html>
