{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Civic Logistics{% endblock %}</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      color: #2B2B2B;
    }

    /* NAVBAR (FIXED) */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* LOGO FIX */
    .logo {
      display: flex;
      align-items: center;
      height: 55px;
      text-decoration: none;
    }

    .logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0;
      padding: 0;
    }

    nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #2B2B2B;
      font-weight: 600;
    }

    nav a:hover {
      color: #FF7A1A;
    }

    .menu-btn {
      display: none;
      font-size: 26px;
      cursor: pointer;
      background: none;
      border: none;
    }

    main {
      min-height: 80vh;
    }

    /* HERO */
    .hero {
      min-height: 80vh;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      padding: 70px 8%;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fb, #ffffff);
    }

    .tagline {
      color: #FF7A1A;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: 56px;
      line-height: 1.1;
      margin-bottom: 20px;
      color: #123C8C;
    }

    .hero-text {
      font-size: 18px;
      color: #555;
      max-width: 600px;
      line-height: 1.7;
    }

    .hero-buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      margin-right: 12px;
    }

    .primary {
      background: #123C8C;
      color: white;
    }

    .secondary {
      background: white;
      color: #123C8C;
      border: 1px solid #123C8C;
    }

    /* NEW HERO ELEMENTS */
    .hero-stats {
      display: flex;
      gap: 18px;
      margin-top: 35px;
      flex-wrap: wrap;
    }

    .hero-stats div {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    .hero-stats strong {
      display: block;
      color: #123C8C;
    }

    .delivery-panel {
      background: #123C8C;
      color: white;
      padding: 34px;
      border-radius: 28px;
    }

    .panel-header {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background: #FF7A1A;
      border-radius: 50%;
    }

    .route-card,
    .tracking-card {
      background: white;
      color: #2B2B2B;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
    }

    .mini-progress {
      display: flex;
      gap: 8px;
    }

    .mini-progress span {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
    }

    .mini-progress .active {
      background: #FF7A1A;
    }

    /* HOW IT WORKS */
    .how-it-works {
      padding: 70px 8%;
      text-align: center;
      background: white;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .step-card {
      background: #f7f9fc;
      padding: 28px;
      border-radius: 18px;
      text-align: left;
    }

    /* SERVICES */
    .services {
      padding: 70px 8%;
      text-align: center;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .service-card {
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    /* TRUST */
    .trust-section {
      padding: 70px 8%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      background: #f7f9fc;
    }

    .trust-list {
      background: white;
      padding: 25px;
      border-radius: 18px;
    }

    /* CTA */
    .cta {
      text-align: center;
      padding: 70px 8%;
      background: #123C8C;
      color: white;
    }

    /* BOOKING PAGE */
    .booking-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .form-section {
      margin-bottom: 25px;
    }

    .form-section h3 {
      color: #123C8C;
      margin-bottom: 10px;
    }

    .full {
      width: 100%;
    }

    .booking-summary {
      background: #123C8C;
      color: white;
      padding: 30px;
      border-radius: 22px;
      position: sticky;
      top: 100px;
    }

    .booking-section {
  padding: 70px 8%;
  background: #f7f9fc;
}

.booking-box {
  background: white;
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
}

    .summary-card {
      background: white;
      color: #2B2B2B;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 15px;
    }

    .summary-card strong {
      color: #123C8C;
    }

    footer {
      text-align: center;
      padding: 24px;
      background: white;
      color: #888;
    }

    /* MOBILE */
    @media (max-width: 900px) {
      .menu-btn {
        display: block;
      }

      nav {
        display: none;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        padding: 20px;
      }

      nav.active {
        display: flex;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .steps-grid,
      .service-grid,
      .trust-section,
      .booking-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header class="navbar">
  <a href="{% url 'home' %}" class="logo">
    <img src="{% static 'shipments/images/logo.png' %}" alt="Civic Logistics Logo">
  </a>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <nav id="navMenu">
    <a href="{% url 'home' %}">Home</a>
    <a href="#">Services</a>
    <a href="{% url 'track_shipment' %}">Track Parcel</a>
    <a href="{% url 'book_shipment' %}">Book Delivery</a>
    <a href="#">Contact</a>
  </nav>
</header>

<main>
  {% block content %}
  {% endblock %}
</main>

<footer>
  <p>&copy; 2014 Civic Logistics. All rights reserved.</p>
</footer>

<script>
  function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
  }
</script>

</body>
</html>
