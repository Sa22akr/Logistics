{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Civic Logistics{% endblock %}</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: Arial, sans-serif;
      background: #f7f9fc;
      color: #2B2B2B;
    }

    /* NAVBAR (FIXED) */
    .navbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      background: white;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    /* LOGO FIX */
    .logo {
      display: flex;
      align-items: center;
      height: 55px;
      text-decoration: none;
    }

    .logo img {
      height: 100%;
      width: auto;
      object-fit: contain;
      display: block;
      margin: 0;
      padding: 0;
    }

    nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      color: #2B2B2B;
      font-weight: 600;
    }

    nav a:hover {
      color: #FF7A1A;
    }

    .menu-btn {
      display: none;
      font-size: 26px;
      cursor: pointer;
      background: none;
      border: none;
    }

    main {
      min-height: 80vh;
    }

    /* HERO */
    .hero {
      min-height: 80vh;
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 40px;
      padding: 70px 8%;
      align-items: center;
      background: linear-gradient(135deg, #f5f7fb, #ffffff);
    }

    .tagline {
      color: #FF7A1A;
      font-weight: 700;
      margin-bottom: 14px;
    }

    .hero h1 {
      font-size: 56px;
      line-height: 1.1;
      margin-bottom: 20px;
      color: #123C8C;
    }

    .hero-text {
      font-size: 18px;
      color: #555;
      max-width: 600px;
      line-height: 1.7;
    }

    .hero-buttons {
      margin-top: 30px;
    }

    .btn {
      display: inline-block;
      padding: 14px 24px;
      border-radius: 8px;
      text-decoration: none;
      font-weight: 700;
      margin-right: 12px;
    }

    .primary {
      background: #123C8C;
      color: white;
    }

    .secondary {
      background: white;
      color: #123C8C;
      border: 1px solid #123C8C;
    }

    /* NEW HERO ELEMENTS */
    .hero-stats {
      display: flex;
      gap: 18px;
      margin-top: 35px;
      flex-wrap: wrap;
    }

    .hero-stats div {
      background: white;
      padding: 18px;
      border-radius: 16px;
      box-shadow: 0 8px 25px rgba(0,0,0,0.06);
    }

    .hero-stats strong {
      display: block;
      color: #123C8C;
    }

    .delivery-panel {
      background: #123C8C;
      color: white;
      padding: 34px;
      border-radius: 28px;
    }

    .panel-header {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      background: #FF7A1A;
      border-radius: 50%;
    }

    .route-card,
    .tracking-card {
      background: white;
      color: #2B2B2B;
      padding: 20px;
      border-radius: 16px;
      margin-bottom: 15px;
    }

    .mini-progress {
      display: flex;
      gap: 8px;
    }

    .mini-progress span {
      flex: 1;
      height: 6px;
      background: rgba(255,255,255,0.3);
      border-radius: 20px;
    }

    .mini-progress .active {
      background: #FF7A1A;
    }

    /* HOW IT WORKS */
    .how-it-works {
      padding: 70px 8%;
      text-align: center;
      background: white;
    }

    .steps-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
    }

    .step-card {
      background: #f7f9fc;
      padding: 28px;
      border-radius: 18px;
      text-align: left;
    }

    /* SERVICES */
    .services {
      padding: 70px 8%;
      text-align: center;
    }

    .service-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 22px;
    }

    .service-card {
      background: white;
      padding: 28px;
      border-radius: 18px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.06);
    }

    /* TRUST */
    .trust-section {
      padding: 70px 8%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 30px;
      background: #f7f9fc;
    }

    .trust-list {
      background: white;
      padding: 25px;
      border-radius: 18px;
    }

    /* CTA */
    .cta {
      text-align: center;
      padding: 70px 8%;
      background: #123C8C;
      color: white;
    }

    /* BOOKING PAGE */
    .booking-container {
      display: grid;
      grid-template-columns: 2fr 1fr;
      gap: 30px;
      align-items: start;
    }

    .form-section {
      margin-bottom: 25px;
    }

    .form-section h3 {
      color: #123C8C;
      margin-bottom: 10px;
    }

    .full {
      width: 100%;
    }

    .booking-summary {
      background: #123C8C;
      color: white;
      padding: 30px;
      border-radius: 22px;
      position: sticky;
      top: 100px;
    }

    .booking-section {
  padding: 70px 8%;
  background: #f7f9fc;
}

.booking-box {
  background: white;
  padding: 40px;
  border-radius: 24px;
  box-shadow: 0 12px 35px rgba(0,0,0,0.08);
}

    .summary-card {
      background: white;
      color: #2B2B2B;
      padding: 18px;
      border-radius: 14px;
      margin-bottom: 15px;
    }

    .summary-card strong {
      color: #123C8C;
    }

    footer {
      text-align: center;
      padding: 24px;
      background: white;
      color: #888;
    }


    /* SUCCESS PAGE */
.success-section {
  padding: 80px 8%;
  display: flex;
  justify-content: center;
  background: #f7f9fc;
}

.success-box {
  max-width: 700px;
  width: 100%;
  background: white;
  padding: 50px;
  border-radius: 28px;
  text-align: center;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.success-icon {
  width: 70px;
  height: 70px;
  background: #16a34a;
  color: white;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 32px;
  margin: 0 auto 20px;
}

.success-box h1 {
  color: #123C8C;
  margin-bottom: 10px;
  font-size: 34px;
}

.success-text {
  color: #555;
  margin-bottom: 30px;
  line-height: 1.6;
}

.success-card {
  background: #f7f9fc;
  padding: 25px;
  border-radius: 18px;
  margin-bottom: 25px;
}

.success-card .label {
  font-size: 14px;
  color: #666;
}

.success-card h2 {
  color: #123C8C;
  margin: 10px 0 20px;
}

.success-details p {
  margin-bottom: 10px;
  color: #333;
}

.success-actions {
  margin-top: 20px;
}


/* TRACKING PAGE UPGRADE */
.tracking-section {
  padding: 80px 8%;
  background: #f7f9fc;
}

.tracking-container {
  max-width: 1100px;
  margin: auto;
}

.tracking-box {
  background: white;
  padding: 45px;
  border-radius: 26px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
  margin-bottom: 35px;
}

.tracking-box h1 {
  font-size: 42px;
  color: #123C8C;
  margin-bottom: 12px;
}

.tracking-text {
  color: #555;
  line-height: 1.6;
  margin-bottom: 28px;
}

.tracking-form {
  display: flex;
  gap: 14px;
}

.tracking-form input {
  flex: 1;
  padding: 15px 16px;
  border: 1px solid #d6dce8;
  border-radius: 12px;
  font-size: 15px;
  outline: none;
}

.tracking-form input:focus {
  border-color: #123C8C;
  box-shadow: 0 0 0 3px rgba(18,60,140,0.12);
}

.tracking-error {
  margin-top: 22px;
  background: #fff1f1;
  color: #b91c1c;
  padding: 16px;
  border-radius: 14px;
  font-weight: 600;
}

.tracking-result {
  background: white;
  padding: 40px;
  border-radius: 26px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.08);
}

.tracking-result-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 20px;
  margin-bottom: 28px;
}

.tracking-result-header h2 {
  color: #123C8C;
  font-size: 30px;
}

.tracking-details-grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 18px;
  margin-bottom: 35px;
}

.detail-card {
  background: #f7f9fc;
  padding: 20px;
  border-radius: 16px;
}

.detail-card span {
  display: block;
  color: #666;
  font-size: 14px;
  margin-bottom: 6px;
}

.detail-card strong {
  color: #2B2B2B;
  line-height: 1.5;
}

.tracking-timeline {
  background: #f7f9fc;
  padding: 28px;
  border-radius: 20px;
}

.tracking-timeline h3 {
  color: #123C8C;
  margin-bottom: 22px;
}

.timeline {
  display: grid;
  gap: 22px;
}

.timeline-step {
  display: grid;
  grid-template-columns: 22px 1fr;
  gap: 14px;
  position: relative;
}

.timeline-step span {
  width: 18px;
  height: 18px;
  background: #d6dce8;
  border-radius: 50%;
  margin-top: 3px;
}

.timeline-step.active span {
  background: #FF7A1A;
}

.timeline-step strong {
  color: #123C8C;
}

nav {
  display: flex;
  gap: 34px;
  align-items: center;
}

nav a {
  text-decoration: none;
  color: #2B2B2B;
  font-weight: 700;
  font-size: 17px;
  position: relative;
  padding: 8px 0;
}

nav a:hover {
  color: #123C8C;
}

nav a::after {
  content: "";
  position: absolute;
  left: 0;
  bottom: 0;
  width: 0;
  height: 3px;
  background: #FF7A1A;
  border-radius: 10px;
  transition: width 0.25s ease;
}

nav a:hover::after {
  width: 100%;
}

.timeline-step p {
  color: #666;
  margin-top: 4px;
}

/* PROMO BANNER */
/* EVRI-STYLE PROMO CAROUSEL */
.promo-section {
  position: relative;
  background: #08118f;
  padding: 90px 8% 75px;
}

.promo-card {
  display: grid;
  grid-template-columns: 1.15fr 0.85fr;
  max-width: 1300px;
  margin: auto;
  background: white;
  border-radius: 4px;
  overflow: hidden;
}

.promo-content {
  padding: 60px 70px;
}

.promo-content h2 {
  font-size: 42px;
  color: #050a64;
  margin-bottom: 24px;
}

.promo-content p {
  font-size: 23px;
  line-height: 1.45;
  color: #050a64;
  max-width: 700px;
  margin-bottom: 35px;
}

.promo-buttons {
  display: flex;
  gap: 18px;
}

.promo-buttons img {
  height: 54px;
  width: auto;
}

.promo-image {
  height: 360px;
}

.promo-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.promo-arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: white;
  color: #08118f;
  border: none;
  width: 38px;
  height: 38px;
  border-radius: 50%;
  font-size: 38px;
  line-height: 32px;
  cursor: pointer;
  font-weight: 700;
}

.promo-arrow.left {
  left: 42px;
}

.promo-arrow.right {
  right: 42px;
}

.promo-dots {
  display: flex;
  justify-content: center;
  gap: 10px;
  margin-top: 28px;
}

.promo-dots span {
  width: 10px;
  height: 10px;
  background: #c8e8ff;
  border-radius: 50%;
  display: block;
}

.promo-dots .active {
  width: 25px;
  border-radius: 999px;
  background: #51e6ed;
}

/* PRICING SECTION */
.pricing-section {
  padding: 80px 8%;
  background: white;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 70px;
  align-items: center;
}

.pricing-table-wrap {
  border: 1px solid #d8e4f2;
  overflow-x: auto;
}

.pricing-table {
  width: 100%;
  border-collapse: collapse;
  color: #050f6b;
  font-size: 18px;
}

.pricing-table th,
.pricing-table td {
  padding: 22px;
  text-align: center;
}

.pricing-table th {
  font-weight: 800;
  background: white;
}

.pricing-table tbody tr:nth-child(odd) {
  background: #eef6fb;
}

.pricing-content {
  color: #050f6b;
}

.price-logo {
  font-size: 76px;
  font-weight: 900;
  color: #0788d8;
  letter-spacing: 3px;
  margin-bottom: 20px;
}

.pricing-content h2 {
  font-size: 42px;
  line-height: 1.2;
  margin-bottom: 20px;
}

.pricing-content p {
  font-size: 20px;
  line-height: 1.5;
  margin-bottom: 24px;
}

.price-btn {
  display: inline-block;
  padding: 14px 34px;
  border: 3px solid #0788d8;
  border-radius: 40px;
  color: #0070a8;
  text-decoration: none;
  font-weight: 800;
  font-size: 18px;
}

/* PAGE HERO */
.page-hero {
  padding: 80px 8% 40px;
  text-align: center;
}

.page-hero h1 {
  font-size: 42px;
  color: #123C8C;
  margin-bottom: 15px;
}

.page-hero .hero-text {
  max-width: 700px;
  margin: auto;
}

/* SERVICES PAGE */
.services-section {
  padding: 50px 8% 80px;
}

.service-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.service-card {
  background: white;
  padding: 28px;
  border-radius: 18px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
  transition: 0.3s;
}

.service-card:hover {
  transform: translateY(-5px);
}

.service-card h3 {
  color: #123C8C;
  margin-bottom: 10px;
}

.service-card p {
  color: #666;
}

/* CONTACT */
.contact-section {
  padding: 60px 8%;
}

.contact-container {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
}

.contact-info h3 {
  color: #123C8C;
  margin-bottom: 15px;
}

.contact-info p {
  margin-bottom: 10px;
}

.contact-note {
  margin-top: 20px;
  color: #666;
}

.contact-form input,
.contact-form textarea {
  width: 100%;
  padding: 14px;
  margin-bottom: 12px;
  border-radius: 10px;
  border: 1px solid #ddd;
}

.contact-form textarea {
  min-height: 120px;
}

/* CAREERS PAGE */
.careers-section {
  padding: 60px 8%;
  background: #f7f9fc;
}

.careers-intro {
  max-width: 850px;
  margin: 0 auto 45px;
  text-align: center;
}

.careers-intro h2,
.team-section h2 {
  color: #123C8C;
  font-size: 36px;
  margin-bottom: 15px;
}

.careers-intro p {
  color: #555;
  line-height: 1.7;
  font-size: 18px;
}

.jobs-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 24px;
}

.job-card {
  background: white;
  padding: 30px;
  border-radius: 20px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.06);
}

.job-card h3 {
  color: #123C8C;
  margin-bottom: 12px;
}

.job-card p {
  color: #666;
  line-height: 1.6;
  margin-bottom: 18px;
}

.job-card span {
  color: #FF7A1A;
  font-weight: 700;
}

.team-section {
  padding: 70px 8%;
  background: white;
  text-align: center;
}

.team-grid {
  margin-top: 35px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 24px;
}

.team-card {
  background: #f7f9fc;
  padding: 24px;
  border-radius: 20px;
  box-shadow: 0 8px 22px rgba(0,0,0,0.05);
}

.team-card img {
  width: 100%;
  height: 230px;
  object-fit: cover;
  border-radius: 16px;
  margin-bottom: 18px;
}

.team-card h3 {
  color: #123C8C;
  margin-bottom: 6px;
}

.team-card p {
  color: #666;
}

.section-heading {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}

.section-heading span {
  width: 32px;
  height: 32px;
  background: #123C8C;
  color: white;
  border-radius: 50%;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 13px;
}

.section-heading h3 {
  margin: 0;
}

.booking-box h1 {
  color: #123C8C;
  font-size: 42px;
  margin-bottom: 10px;
}

.summary-highlight {
  margin-top: 20px;
  padding: 20px;
  border-radius: 16px;
  background: rgba(255,255,255,0.14);
}

.summary-highlight p {
  font-weight: 800;
  margin-bottom: 8px;
}

.summary-highlight span {
  font-size: 14px;
  line-height: 1.5;
  color: #e5e7eb;
}

/* MOBILE */
@media (max-width: 900px) {
  .promo-card,
  .pricing-section {
    grid-template-columns: 1fr;
  }

  .promo-content {
    padding: 32px;
  }

  .promo-content h2,
  .pricing-content h2 {
    font-size: 32px;
  }

  .price-logo {
    font-size: 48px;
  }

  .pricing-section {
    gap: 35px;
    padding: 55px 6%;
  }

  .pricing-table {
    font-size: 14px;
    min-width: 600px;
  }
}
    /* MOBILE */
    @media (max-width: 900px) {
      .menu-btn {
        display: block;
      }

      nav {
        display: none;
        position: absolute;
        top: 70px;
        left: 0;
        width: 100%;
        background: white;
        flex-direction: column;
        padding: 20px;
      }

      nav.active {
        display: flex;
      }

      .hero {
        grid-template-columns: 1fr;
      }

      .steps-grid,
      .service-grid,
      .trust-section,
      .booking-container {
        grid-template-columns: 1fr;
      }
      .tracking-form,
.tracking-result-header {
  flex-direction: column;
  align-items: flex-start;
}

.tracking-details-grid {
  grid-template-columns: 1fr;
}

.tracking-box,
.tracking-result {
  padding: 28px;
}
    }
  </style>
</head>

<body>

<header class="navbar">
  <a href="{% url 'home' %}" class="logo">
    <img src="{% static 'shipments/images/logo.png' %}" alt="Civic Logistics Logo">
  </a>

  <button class="menu-btn" onclick="toggleMenu()">☰</button>

  <nav id="navMenu">
  <a href="{% url 'home' %}">Home</a>
  <a href="{% url 'services' %}">Services</a>
  <a href="{% url 'track_shipment' %}">Track Parcel</a>
  <a href="{% url 'book_shipment' %}">Book Delivery</a>
  <a href="{% url 'contact' %}">Contact</a>
  <a href="{% url 'careers' %}">Careers</a>
</nav>
</header>

<main>
  {% block content %}
  {% endblock %}
</main>

<footer>
  <p>&copy; 2014 Civic Logistics. All rights reserved.</p>
</footer>

<script>
  function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
  }
  const slides = [
    {
      title: "Send parcels with confidence",
      text: "Book deliveries, track parcels, and manage your shipments from one simple platform.",
      image: "{% static 'shipments/images/courier-promo.jpg' %}"
    },
    {
      title: "Track every delivery live",
      text: "Stay updated from collection to delivery with clear shipment progress.",
      image: "{% static 'shipments/images/courier-tracking.jpg' %}"
    },
    {
      title: "Flexible courier options",
      text: "Choose same-day, next-day, or scheduled delivery depending on your needs.",
      image: "{% static 'shipments/images/courier-van.jpg' %}"
    }
  ];

  let currentSlide = 0;

  function updatePromoSlide(index) {
    const title = document.getElementById("promoTitle");
    const text = document.getElementById("promoText");
    const image = document.getElementById("promoImage");
    const dots = document.querySelectorAll(".promo-dots span");

    if (!title || !text || !image) return;

    currentSlide = (index + slides.length) % slides.length;

    title.textContent = slides[currentSlide].title;
    text.textContent = slides[currentSlide].text;
    image.src = slides[currentSlide].image;

    dots.forEach((dot, i) => {
      dot.classList.toggle("active", i === currentSlide);
    });
  }

  function nextPromoSlide() {
    updatePromoSlide(currentSlide + 1);
  }

  function prevPromoSlide() {
    updatePromoSlide(currentSlide - 1);
  }

  setInterval(nextPromoSlide, 5000);
</script>

</body>
</html>
